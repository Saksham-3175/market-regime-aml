version: "3.9"

services:

  api:
    build: .
    command: >
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
      - ./mlflow:/app/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build: .
    command: >
      streamlit run src/dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    build: .
    command: >
      mlflow ui
      --backend-store-uri mlflow
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/app/mlflow
