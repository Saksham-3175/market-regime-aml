data:
  ticker: "^GSPC"
  start_date: "2000-01-01"
  end_date: null  # null → defaults to today at runtime

features:
  vol_window: 21      # realized volatility rolling window (trading days, ~1 month)
  volume_window: 21   # volume ratio rolling window (trading days, ~1 month)

model:
  n_states_range: [2, 3, 4, 5]   # BIC sweep over these state counts
  covariance_type: "full"         # full covariance captures cross-feature correlations
  n_iter: 100                     # max EM iterations per fit
  n_seeds: 10                     # random restarts to escape local optima
  random_state: 42                # base seed; each restart uses random_state + seed_idx

mlflow:
  tracking_uri: "mlflow"          # local directory for MLflow tracking store
  experiment_name: "market-regime-hmm"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/hmm_3state.pkl"   # path to saved model artifact
  title: "Market Regime HMM API"
  version: "1.0.0"
